<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Phase8-1 競馬場セレクターUI</title>
  <style>
    :root{--bg:#0d0d0c;--panel:#151410;--panel2:#1d1a13;--ink:#f7f1df;--muted:#b8ad91;--line:rgba(212,175,55,.24);--gold:#f2d675}*{box-sizing:border-box}body{margin:0;min-width:320px;background:linear-gradient(180deg,rgba(212,175,55,.08),rgba(13,13,12,0) 260px),var(--bg);color:var(--ink);font-family:"Yu Gothic","Meiryo",system-ui,sans-serif}header,main{padding-inline:clamp(16px,4vw,46px)}header{display:grid;gap:12px;padding-block:28px 18px;border-bottom:1px solid var(--line);background:rgba(10,10,9,.96)}h1,h2,p{margin:0}h1{color:var(--gold);font-size:clamp(26px,3vw,40px)}h2{font-size:18px}.eyebrow,.meta,label span,.summary span,.course-card p,.folder-link span,.racecourse-button span{color:var(--muted);font-size:12px;font-weight:800;line-height:1.5}main{display:grid;gap:18px;padding-block:20px 44px}.panel,.summary article,.selector,.selected,.course-card,.folder-link,.racecourse-button{border:1px solid var(--line);border-radius:8px;background:var(--panel);box-shadow:0 18px 42px rgba(0,0,0,.32)}.panel{overflow:hidden}.section-heading{display:flex;align-items:center;justify-content:space-between;gap:14px;min-height:68px;padding:15px 18px;border-bottom:1px solid var(--line);background:linear-gradient(90deg,rgba(212,175,55,.12),rgba(212,175,55,0))}.pill{border:1px solid rgba(212,175,55,.36);border-radius:999px;background:rgba(212,175,55,.12);color:var(--gold);padding:6px 10px;font-size:12px;font-weight:900;white-space:nowrap}.selector-row,.button-grid,.summary,.folder-grid,.course-grid{display:grid;gap:12px;padding:16px 18px}.selector-row{grid-template-columns:minmax(240px,360px) 1fr;padding-bottom:0}.button-grid{grid-template-columns:repeat(5,minmax(0,1fr));padding-top:12px}.selector,.selected,.summary article,.folder-link,.course-card,.racecourse-button{display:grid;gap:8px;background:var(--panel2);padding:14px}select{width:100%;min-height:42px;border:1px solid rgba(212,175,55,.42);border-radius:6px;background:#0f0e0b;color:var(--ink);padding:0 10px;font:inherit;font-weight:800}.racecourse-button{min-height:74px;color:var(--ink);font:inherit;text-align:left;cursor:pointer}.racecourse-button strong{color:var(--gold);font-size:16px}.racecourse-button:hover,.racecourse-button.active{border-color:var(--gold);background:#211b0f}.selected strong,.summary strong{color:var(--gold);font-size:24px}.summary{grid-template-columns:repeat(auto-fit,minmax(170px,1fr))}.folder-grid{grid-template-columns:repeat(7,minmax(0,1fr));padding-top:0}.folder-link{min-height:92px;align-content:center;color:var(--ink);text-decoration:none}.folder-link strong,.course-card a{color:var(--gold)}.course-grid{grid-template-columns:repeat(3,minmax(0,1fr));padding-top:0}.course-card{min-height:190px}.course-card.active{border-color:var(--gold);background:#211b0f}.course-card a{font-size:12px;font-weight:900;text-decoration:none}.chips{display:flex;flex-wrap:wrap;gap:8px}.chips span{border-radius:6px;background:rgba(255,255,255,.05);color:var(--ink);padding:5px 7px;font-size:12px;font-weight:800}@media(max-width:1100px){.folder-grid,.course-grid,.button-grid,.selector-row{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header>
    <p class="eyebrow">Hashimoto Keiba AI / Phase8-1</p>
    <h1>競馬場セレクターUI</h1>
    <p class="meta">Tokyo, Nakayama, Hanshin, Kyoto, Chukyo, Fukushima, Niigata, Kokura, Hakodate, Sapporo をボタンで選択し、各競馬場ダッシュボードへ接続します。</p>
  </header>
  <main>
    <section class="panel" aria-label="Phase8-1競馬場セレクターUI">
      <div class="section-heading"><div><p class="eyebrow">Phase8-1 Racecourse Selector</p><h2>競馬場ボタンセレクター</h2></div><span class="pill">10競馬場対応</span></div>
      <div class="selector-row"><label class="selector" for="phase8-racecourse-selector"><span>競馬場</span><select id="phase8-racecourse-selector" aria-label="競馬場を選択"></select></label><div class="selected"><strong id="phase8-selected-course">--</strong><span id="phase8-selected-ai">--</span></div></div>
      <div class="button-grid" id="phase8-racecourse-buttons" aria-label="競馬場ボタン一覧"></div>
      <div class="summary"><article><span>管理競馬場</span><strong id="phase8-course-count">0場</strong></article><article><span>レースDB準備</span><strong id="phase8-race-db-count">0件</strong></article><article><span>AI分析準備</span><strong id="phase8-ai-analysis-count">0件</strong></article><article><span>次フェーズ</span><strong id="phase8-next-action">--</strong></article></div>
      <div class="folder-grid" id="phase8-selected-links"></div>
      <div class="course-grid" id="phase8-course-cards"></div>
    </section>
  </main>
  <script src="phase8-racecourse.js"></script>
</body>
</html>
